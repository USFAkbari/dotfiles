# 2. Enable mouse support (already discussed, but keeps it in your file)
set -g mouse on

# 3. Increase history limit (default is only 2,000)
set -g history-limit 50000

# 5. Start window and pane numbering at 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# 6. Faster config reloading (Prefix + r)
bind r source-file ~/.config/tmux/tmux.conf\; display "Config reloaded!"

# Tokyo Night colors for tmux
set -g status-style bg="#1a1b26",fg="#a9b1d6"

# Left side: Session name with a bold purple background
set -g status-left "#[fg=#1a1b26,bg=#bb9af7,bold] #S #[default] "

# Window list style
set -g window-status-format " #[fg=#565f89]#I:#W "
set -g window-status-current-format "#[fg=#7aa2f7,bg=#3b4261,bold] #I:#W #[default]"

# Right side: Date and Time with neon accents
set -g status-right "#[fg=#2ac3de]%Y-%m-%d #[fg=#7aa2f7]%H:%M "

# Pane borders
set -g pane-border-style fg="#3b4261"
set -g pane-active-border-style fg="#7aa2f7"

# Message/Command line colors
set -g message-style bg="#7aa2f7",fg="#1a1b26",bold
